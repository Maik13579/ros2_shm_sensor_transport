shm_sensor_transport:
  ros__parameters:
    common:
      input_topic: "/camera/image_raw"
      status_topic: ""
      shm_name: ""
      slot_count: 8
      slot_size_bytes: 0
      allow_resize: false
      publish_status: false
      status_rate: 1.0
    qos:
      use_sensor_data_qos: true
      reliable: false
      depth: 1
    diagnostics:
      warn_on_oversized_frame: true
      warn_on_late_initialization: true
